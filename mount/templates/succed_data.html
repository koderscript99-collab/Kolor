
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolor - Purchase Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #f9fafb; min-height: 100vh; }

        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 32px; border-bottom: 1.5px solid #e5e7eb;
            background: #fff; position: sticky; top: 0; z-index: 100;
        }
        .brand-name {
            font-size: 22px; font-weight: 900;
            background: linear-gradient(90deg, #7dd3fc, #3b82f6, #1d4ed8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: 1px;
        }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #0078ff);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 15px;
        }
        .user-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }

        .container {
            max-width: 500px; margin: 60px auto; padding: 0 24px;
            display: flex; flex-direction: column; align-items: center;
        }

        .success-card {
            background: #fff; border-radius: 20px;
            border: 1.5px solid #e5e7eb;
            box-shadow: 0 8px 40px rgba(0,0,0,.08);
            padding: 48px 36px; text-align: center; width: 100%;
        }

        .icon-wrap {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; margin: 0 auto 24px;
            box-shadow: 0 4px 20px rgba(34,197,94,.2);
        }

        h1 {
            font-size: 24px; font-weight: 900; color: #15803d; margin-bottom: 10px;
        }
        p {
            font-size: 14px; color: #6b7280; font-weight: 600;
            line-height: 1.6; margin-bottom: 32px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn-primary {
            display: block; padding: 14px; border-radius: 12px;
            background: linear-gradient(90deg, #4facfe, #0078ff);
            color: white; font-size: 15px; font-weight: 700;
            text-decoration: none; text-align: center;
            transition: opacity .2s, transform .15s;
        }
        .btn-primary:hover { opacity: .9; transform: translateY(-1px); }

        .btn-secondary {
            display: block; padding: 14px; border-radius: 12px;
            background: #f3f4f6; color: #374151;
            font-size: 15px; font-weight: 700;
            text-decoration: none; text-align: center;
            transition: background .2s;
        }
        .btn-secondary:hover { background: #e5e7eb; }

        @media (max-width: 480px) {
            .container { margin: 32px auto; }
            .success-card { padding: 36px 24px; }
            .topbar { padding: 14px 16px; }
        }
    </style>
</head>
<body>

<nav class="topbar">
    <div class="brand-name">kolor</div>
    <div class="topbar-right">
        <div class="avatar">{{ user.username|slice:":1"|upper }}</div>
        <span class="user-name">{{ user.username }}</span>
    </div>
</nav>

<div class="container">
    <div class="success-card">
        <div class="icon-wrap">✅</div>
        <h1>Purchase Successful!</h1>
        <p>
            Your data purchase was completed successfully.<br>
            The data will be delivered to the phone number shortly.
        </p>
        <div class="btn-group">
            <a href="{% url 'payment' %}" class="btn-primary">💳 Make Another Purchase</a>
            <a href="{% url 'home' %}" class="btn-secondary">🏠 Go to Home</a>
        </div>
    </div>
</div>

</body>
</html>
