

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolor - Report Submitted</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .logo-wrap {
    margin-bottom: 32px;
    text-align: center;
  }

  .brand-name {
    font-size: 24px;
    font-weight: 900;
    background: linear-gradient(90deg, #7dd3fc, #3b82f6, #1d4ed8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .card {
    background: #fff;
    width: 100%;
    max-width: 480px;
    padding: 40px 32px;
    border-radius: 16px;
    border: 1.5px solid #e5e7eb;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    text-align: center;
  }

  .success-icon {
    font-size: 60px;
    margin-bottom: 18px;
  }

  .card-title {
    font-size: 22px;
    font-weight: 900;
    color: #1a1a1a;
    margin-bottom: 10px;
  }

  .card-sub {
    font-size: 14px;
    color: #6b7280;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .btn-home {
    display: inline-block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    background: linear-gradient(90deg, #4facfe 0%, #0078ff 100%);
    color: white;
    font-size: 16px;
    font-weight: 700;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-home:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .btn-home:active {
    transform: translateY(0);
  }
</style>

</head>
<body>

  <div class="logo-wrap">
    <div class="brand-name">kolor</div>
  </div>

  <div class="card">
    <div class="success-icon">✅</div>
